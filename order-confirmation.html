<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gadgets 7/11 | Order Confirmed</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #0f172a;
            --secondary: #0e7490;
            --background: #f8fafc;
            --surface: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --border: #e2e8f0;
        }
        body {
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--background);
            color: var(--text-primary);
            line-height: 1.6;
            padding-top: 96px;
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
        }
        .header-content {
            max-width: 1280px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo h1 { font-size: 1.75rem; color: var(--primary); display: flex; align-items: center; gap: 0.5rem; }
        .logo p { font-size: 0.75rem; color: var(--text-secondary); letter-spacing: 0.2em; }
        .nav { display: flex; gap: 2rem; align-items: center; }
        .nav a { text-decoration: none; color: var(--text-primary); font-weight: 500; }
        .nav a:hover { color: var(--secondary); }
        .btn {
            padding: 0.875rem 2rem;
            background: var(--primary);
            color: white;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Manrope', sans-serif;
            text-decoration: none;
            display: inline-block;
        }
        .btn:hover { background: var(--secondary); }
        .btn-primary { background: var(--secondary); }
        .confirm-container { max-width: 500px; margin: 0 auto; padding: 2rem; }
        .confirm-box {
            background: var(--surface);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            text-align: center;
        }
        .confirm-box i { font-size: 4rem; color: var(--secondary); margin-bottom: 1rem; }
        .confirm-box h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .confirm-box p { color: var(--text-secondary); margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <h1>Gadgets 7/11 <img src="—Pngtree—gadget icon graphic design template_3790049.png" alt="Logo" style="height: 48px;"></h1>
                <p>USEFUL | RELIABLE | AFFORDABLE</p>
            </div>
            <nav class="nav">
                <a href="index.html">Home</a>
                <a href="productcat.html">Product Categories</a>
                <a href="productdetails.html">Product Details</a>
                <a href="shoppingcart.html" class="btn" style="color:white">Shopping Cart <i class="fa-solid fa-cart-shopping" style="margin-left: 8px;"></i></a>
            </nav>
        </div>
    </header>

    <main class="confirm-container">
        <div class="confirm-box">
            <i class="fa-solid fa-circle-check"></i>
            <h2>Order Confirmed!</h2>
            <p>Thank you for your purchase. You will receive an email with you payment link shortly.</p>
            <a href="productdetails.html" class="btn btn-primary">Continue Shopping</a>
        </div>
    </main>
</body>
</html>
